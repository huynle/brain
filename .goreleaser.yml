# Brain API - GoReleaser Configuration
# Usage: goreleaser release --clean
# Check: goreleaser check

version: 2

project_name: brain-api

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: brain-api
    main: ./cmd/brain-api
    binary: brain-api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/huynle/brain-api/internal/config.Version={{.Version}}
      - -X github.com/huynle/brain-api/internal/config.Commit={{.ShortCommit}}
      - -X github.com/huynle/brain-api/internal/config.BuildTime={{.Date}}

  - id: brain-runner
    main: ./cmd/brain-runner
    binary: brain-runner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/huynle/brain-api/internal/config.Version={{.Version}}
      - -X github.com/huynle/brain-api/internal/config.Commit={{.ShortCommit}}
      - -X github.com/huynle/brain-api/internal/config.BuildTime={{.Date}}

  - id: brain
    main: ./cmd/brain
    binary: brain
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/huynle/brain-api/internal/config.Version={{.Version}}
      - -X github.com/huynle/brain-api/internal/config.Commit={{.ShortCommit}}
      - -X github.com/huynle/brain-api/internal/config.BuildTime={{.Date}}

  - id: brain-mcp
    main: ./cmd/brain-mcp
    binary: brain-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/huynle/brain-api/internal/config.Version={{.Version}}
      - -X github.com/huynle/brain-api/internal/config.Commit={{.ShortCommit}}
      - -X github.com/huynle/brain-api/internal/config.BuildTime={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*
      - DEPLOYMENT.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999

dockers_v2:
  - images:
      - "ghcr.io/huynle/brain-api"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    dockerfile: Dockerfile.goreleaser
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "https://github.com/huynle/brain-api"
    ids:
      - brain-api
      - brain-runner
      - brain
      - brain-mcp
    extra_files:
      - README.md

release:
  github:
    owner: huynle
    name: brain-api
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
